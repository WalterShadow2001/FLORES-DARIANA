<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Año de Amor 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*,*::after,*::before { padding:0; margin:0; box-sizing:border-box; }
:root { --dark-color:#000; }

html, body {
  width:100%; min-height:100vh;
  overflow-x:hidden; cursor:none;
}
body {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,#0e1438 0%,#060c1c 52%,#010207 100%);
  overflow:hidden;
  perspective:1000px;
  font-family:'Cormorant Garamond',serif;
}

/* ═══════════════════════════════════════════════
   STARS
═══════════════════════════════════════════════ */
.star {
  position:fixed; border-radius:50%; background:#fff;
  pointer-events:none; z-index:0;
  animation:twinkle var(--d) ease-in-out var(--dl) infinite;
}
@keyframes twinkle {
  0%,100%{opacity:.06;transform:scale(.7)}
  50%    {opacity:.85;transform:scale(1.25)}
}

/* ═══════════════════════════════════════════════
   FIREFLIES
═══════════════════════════════════════════════ */
.fly {
  position:fixed; width:4px; height:4px; border-radius:50%;
  background:#FFD700; box-shadow:0 0 7px 3px rgba(255,215,0,.5);
  pointer-events:none; z-index:2;
  animation:
    fblink var(--bd) ease-in-out var(--bdl) infinite,
    driftX  var(--tx) ease-in-out var(--tdl) infinite alternate,
    driftY  var(--ty) ease-in-out calc(var(--tdl) + .5s) infinite alternate;
}
@keyframes fblink { 0%,100%{opacity:.04} 50%{opacity:.85} }
@keyframes driftX { 0%{left:var(--x0)} 100%{left:var(--x1)} }
@keyframes driftY { 0%{top:var(--y0)}  100%{top:var(--y1)} }

/* ═══════════════════════════════════════════════
   CURSOR SPARKLE
═══════════════════════════════════════════════ */
.sparkle {
  position:fixed; pointer-events:none; z-index:10;
  animation:spk 1.2s ease-out forwards;
}
@keyframes spk {
  0%  {opacity:1;transform:scale(0) rotate(0)}
  45% {opacity:1;transform:scale(1.8) rotate(180deg)}
  100%{opacity:0;transform:scale(0) rotate(360deg) translateY(-44px)}
}

/* ═══════════════════════════════════════════════
   PHOTOS — bigger + more translucent
═══════════════════════════════════════════════ */
.photo-wrap {
  position:fixed; top:50%; transform:translateY(-50%);
  width:240px; height:360px; z-index:2; border-radius:14px;
  overflow:hidden; transition:opacity 1.4s ease;
  animation:photoGlow 3.5s ease-in-out infinite alternate;
}
.photo-wrap.left  { left:10px }
.photo-wrap.right { right:10px }
@keyframes photoGlow {
  0%  { filter:drop-shadow(0 0 8px  rgba(255,215,0,.35)) }
  100%{ filter:drop-shadow(0 0 24px rgba(255,215,0,.75))  }
}
.photo-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  opacity:.75;
  -webkit-mask-image:radial-gradient(ellipse 60% 63% at center,
    black 8%, rgba(0,0,0,.72) 34%, rgba(0,0,0,.25) 57%, transparent 76%);
  mask-image:radial-gradient(ellipse 60% 63% at center,
    black 8%, rgba(0,0,0,.72) 34%, rgba(0,0,0,.25) 57%, transparent 76%);
}

/* ═══════════════════════════════════════════════
   TEXT CONTENT
═══════════════════════════════════════════════ */
.content-wrap {
  position:fixed; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding:44px 268px 0; z-index:5; pointer-events:none;
}
.label {
  font-style:italic; font-weight:300;
  color:rgba(255,220,100,.55); font-size:clamp(.72rem,2vw,.9rem);
  letter-spacing:clamp(4px,2vw,8px); text-transform:uppercase; margin-bottom:8px;
  opacity:0; animation:fadeUp 2s ease .6s forwards;
}
.title {
  font-family:'Playfair Display',serif; font-weight:700;
  font-size:clamp(1.4rem,4vw,2.8rem); color:#FFD700;
  line-height:1.22; letter-spacing:2px; text-align:center;
  animation:textGlow 3s ease-in-out infinite, fadeUp 2s ease .6s both;
}
.msg-wrap {
  text-align:center; max-width:520px; margin:12px 0 0;
  opacity:0; animation:fadeUp 2s ease 1.4s forwards;
}
.msg {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:clamp(.85rem,2.2vw,1.22rem); color:rgba(255,240,160,.92);
  line-height:1.95; text-shadow:0 0 26px rgba(255,215,0,.3);
}
.te-amo {
  color:#FFD700; font-weight:700; font-size:1.35em; display:inline-block;
  margin-top:8px; text-shadow:0 0 14px #FFD700,0 0 30px rgba(255,165,0,.9);
  animation:textGlow 2s ease-in-out infinite;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
@keyframes textGlow {
  0%,100%{ text-shadow:0 0 16px rgba(255,215,0,.8),0 0 36px rgba(255,165,0,.45) }
  50%    { text-shadow:0 0 30px rgba(255,215,0,1),0 0 60px rgba(255,165,0,.9),0 0 100px rgba(255,200,0,.35) }
}

/* ═══════════════════════════════════════════════
   NIGHT BACKGROUND LAYER
═══════════════════════════════════════════════ */
.night {
  z-index:-1; position:absolute; left:50%; top:0;
  transform:translateX(-50%); width:100%; height:100%;
  filter:blur(0.1vmin);
  background-image:
    radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
    radial-gradient(ellipse at bottom, var(--dark-color), rgba(145,233,255,0.07)),
    repeating-linear-gradient(220deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
    repeating-linear-gradient(189deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
    repeating-linear-gradient(148deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
    linear-gradient(90deg,rgb(0,255,250),rgb(240,240,240));
}

/* ═══════════════════════════════════════════════
   FLOWERS — ORIGINAL CSS
═══════════════════════════════════════════════ */
.flowers {
  position:relative;
  transform:scale(0.9);
}
.flower {
  position:absolute; bottom:10vmin;
  transform-origin:bottom center; z-index:10;
  --fl-speed:0.8s;
}
.flower--1 { animation:moving-flower-1 4s linear infinite; }
.flower--1 .flower__line { height:70vmin; animation-delay:0.3s; }
.flower--1 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 1.6s backwards; }
.flower--1 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.4s backwards; }
.flower--1 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
.flower--1 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
.flower--1 .flower__line__leaf--5 { animation:blooming-leaf-right var(--fl-speed) 1.8s backwards; }
.flower--1 .flower__line__leaf--6 { animation:blooming-leaf-left  var(--fl-speed) 2.0s backwards; }

.flower--2 { left:50%; transform:rotate(20deg); animation:moving-flower-2 4s linear infinite; }
.flower--2 .flower__line { height:60vmin; animation-delay:0.6s; }
.flower--2 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 1.9s backwards; }
.flower--2 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.7s backwards; }
.flower--2 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
.flower--2 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.3s backwards; }

.flower--3 { left:50%; transform:rotate(-15deg); animation:moving-flower-3 4s linear infinite; }
.flower--3 .flower__line { animation-delay:0.9s; }
.flower--3 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 2.5s backwards; }
.flower--3 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 2.3s backwards; }
.flower--3 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
.flower--3 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

.flower__leafs {
  position:relative;
  animation:blooming-flower 2s backwards;
}
.flower__leafs--1 { animation-delay:1.1s; }
.flower__leafs--2 { animation-delay:1.4s; }
.flower__leafs--3 { animation-delay:1.7s; }
.flower__leafs::after {
  content:""; position:absolute; left:0; top:0;
  transform:translate(-50%,-100%);
  width:8vmin; height:8vmin;
  background-color:#f9fd25;
  filter:blur(10vmin);
}
.flower__leaf {
  position:absolute; bottom:0; left:50%;
  width:8vmin; height:11vmin;
  border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
  background-color:#fddd25;
  transform-origin:bottom center;
  opacity:0.9;
  box-shadow:inset 0 0 2vmin rgba(255,255,255,0.5);
}
.flower__leaf--1 { transform:translate(-10%,  1%) rotateY(40deg) rotateX(-50deg); }
.flower__leaf--2 { transform:translate(-50%, -4%) rotateX(40deg); }
.flower__leaf--3 { transform:translate(-90%,  0%) rotateY(45deg) rotateX(50deg); }
.flower__leaf--4 {
  width:8vmin; height:8vmin; transform-origin:bottom left;
  border-radius:4vmin 10vmin 4vmin 4vmin;
  transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);
  background-color:#7c6901; z-index:1; opacity:0.8;
}
.flower__white-circle {
  position:absolute; left:-3.5vmin; top:-3vmin;
  width:9vmin; height:4vmin; border-radius:50%;
  background-color:#fff;
}
.flower__white-circle::after {
  content:""; position:absolute; left:50%; top:45%;
  transform:translate(-50%,-50%);
  width:60%; height:60%; border-radius:inherit;
  background-image:
    repeating-linear-gradient(135deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
    repeating-linear-gradient(45deg, rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
    linear-gradient(90deg,rgb(255,235,18),rgb(255,206,0));
}
.flower__line {
  height:55vmin; width:1.5vmin;
  background-image:
    linear-gradient(to left,rgba(0,0,0,.2),transparent,rgba(255,255,255,.2)),
    linear-gradient(to top,transparent 10%,#14757a,#39c6d6);
  box-shadow:inset 0 0 2px rgba(0,0,0,.5);
  animation:grow-flower-tree 4s backwards;
}
.flower__line__leaf {
  --w:7vmin; --h:calc(var(--w) + 2vmin);
  position:absolute; top:20%; left:90%;
  width:var(--w); height:var(--h);
  border-top-right-radius:var(--h); border-bottom-left-radius:var(--h);
  background-image:linear-gradient(to top,rgba(20,117,122,.4),#5ed639);
}
.flower__line__leaf--1 { transform:rotate(70deg) rotateY(30deg); }
.flower__line__leaf--2 { top:45%; transform:rotate(70deg) rotateY(30deg); }
.flower__line__leaf--3,
.flower__line__leaf--4,
.flower__line__leaf--6 {
  border-top-right-radius:0; border-bottom-left-radius:0;
  border-top-left-radius:var(--h); border-bottom-right-radius:var(--h);
  left:-460%; top:12%;
  transform:rotate(-70deg) rotateY(30deg);
}
.flower__line__leaf--4 { top:40%; }
.flower__line__leaf--5 { top:0; transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(0.6); }
.flower__line__leaf--6 { top:-2%; left:-450%; transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(0.6); }

.flower__light {
  position:absolute; bottom:0; width:1vmin; height:1vmin;
  background-color:rgb(255,251,0); border-radius:50%; filter:blur(.2vmin);
  animation:light-ans 4s linear infinite backwards;
}
.flower__light:nth-child(odd) { background-color:#23f0ff; }
.flower__light--1 { left:-2vmin; animation-delay:1.0s; }
.flower__light--2 { left: 3vmin; animation-delay:0.5s; }
.flower__light--3 { left:-6vmin; animation-delay:0.3s; }
.flower__light--4 { left: 6vmin; animation-delay:0.9s; }
.flower__light--5 { left:-1vmin; animation-delay:1.5s; }
.flower__light--6 { left:-4vmin; animation-delay:3.0s; }
.flower__light--7 { left: 3vmin; animation-delay:2.0s; }
.flower__light--8 { left:-6vmin; animation-delay:3.5s; }

/* GRASS */
.flower__grass {
  --c:#159faa; --line-w:1.5vmin;
  position:absolute; bottom:12vmin; left:-7vmin;
  display:flex; flex-direction:column; align-items:flex-end;
  z-index:20; transform-origin:bottom center;
  transform:rotate(-48deg) rotateY(40deg);
}
.flower__grass--1 { animation:moving-grass 2s linear infinite; }
.flower__grass--2 {
  left:2vmin; bottom:10vmin;
  transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
  opacity:0.8; z-index:0;
  animation:moving-grass--2 1.5s linear infinite;
}
.flower__grass--top {
  width:7vmin; height:10vmin;
  border-top-right-radius:100%; border-right:var(--line-w) solid var(--c);
  transform-origin:bottom center; transform:rotate(-2deg);
}
.flower__grass--bottom {
  margin-top:-2px; width:var(--line-w); height:25vmin;
  background-image:linear-gradient(to top,transparent,var(--c));
}
.flower__grass__leaf {
  --size:10vmin; position:absolute;
  width:calc(var(--size)*2.1); height:var(--size);
  border-top-left-radius:var(--size); border-top-right-radius:var(--size);
  background-image:linear-gradient(to top,transparent,transparent 30%,var(--c));
  z-index:100;
}
.flower__grass__leaf--1 { top:-6%;  left:30%;   --size:6vmin;  transform:rotate(-20deg); animation:growing-grass-ans--1 2s 2.6s backwards; }
.flower__grass__leaf--2 { top:-5%;  left:-110%; --size:6vmin;  transform:rotate(10deg);  animation:growing-grass-ans--2 2s 2.4s linear backwards; }
.flower__grass__leaf--3 { top:5%;   left:60%;   --size:8vmin;  transform:rotate(-18deg) rotateX(-20deg); animation:growing-grass-ans--3 2s 2.2s linear backwards; }
.flower__grass__leaf--4 { top:6%;   left:-135%; --size:8vmin;  transform:rotate(2deg);   animation:growing-grass-ans--4 2s 2.0s linear backwards; }
.flower__grass__leaf--5 { top:20%;  left:60%;   --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation:growing-grass-ans--5 2s 1.8s linear backwards; }
.flower__grass__leaf--6 { top:22%;  left:-180%; --size:10vmin; transform:rotate(10deg);  animation:growing-grass-ans--6 2s 1.6s linear backwards; }
.flower__grass__leaf--7 { top:39%;  left:70%;   --size:10vmin; transform:rotate(-10deg); animation:growing-grass-ans--7 2s 1.4s linear backwards; }
.flower__grass__leaf--8 { top:40%;  left:-215%; --size:11vmin; transform:rotate(10deg);  animation:growing-grass-ans--8 2s 1.2s linear backwards; }
.flower__grass__overlay {
  position:absolute; top:-10%; right:0; width:100%; height:100%;
  background-color:rgba(0,0,0,.6); filter:blur(1.5vmin); z-index:100;
}
@keyframes growing-grass-ans--1 { 0%{transform-origin:bottom left;  transform:rotate(-20deg) scale(0)} }
@keyframes growing-grass-ans--2 { 0%{transform-origin:bottom right; transform:rotate(10deg) scale(0)} }
@keyframes growing-grass-ans--3 { 0%{transform-origin:bottom left;  transform:rotate(-18deg) rotateX(-20deg) scale(0)} }
@keyframes growing-grass-ans--4 { 0%{transform-origin:bottom right; transform:rotate(2deg) scale(0)} }
@keyframes growing-grass-ans--5 { 0%{transform-origin:bottom left;  transform:rotate(-24deg) rotateX(-20deg) scale(0)} }
@keyframes growing-grass-ans--6 { 0%{transform-origin:bottom right; transform:rotate(10deg) scale(0)} }
@keyframes growing-grass-ans--7 { 0%{transform-origin:bottom left;  transform:rotate(-10deg) scale(0)} }
@keyframes growing-grass-ans--8 { 0%{transform-origin:bottom right; transform:rotate(10deg) scale(0)} }

/* LONG GRASS STRUCTURES */
.flower__g-long {
  --w:2vmin; --h:6vmin; --c:#159faa;
  position:absolute; bottom:10vmin; left:-3vmin;
  transform-origin:bottom center; transform:rotate(-30deg) rotateY(-20deg);
  display:flex; flex-direction:column; align-items:flex-end;
  animation:flower-g-long-ans 3s linear infinite;
}
.flower__g-long__top {
  top:calc(var(--h)*-1); width:calc(var(--w)+1vmin); height:var(--h);
  border-top-right-radius:100%; border-right:.7vmin solid var(--c);
  transform:translate(-.7vmin,1vmin);
}
.flower__g-long__bottom {
  width:var(--w); height:50vmin; transform-origin:bottom center;
  background-image:linear-gradient(to top,transparent 30%,var(--c));
  box-shadow:inset 0 0 2px rgba(0,0,0,.5);
  clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%);
}
.flower__g-right {
  position:absolute; bottom:6vmin; left:-2vmin;
  transform-origin:bottom left; transform:rotate(20deg);
}
.flower__g-right .leaf {
  width:30vmin; height:50vmin;
  border-top-left-radius:100%; border-left:2vmin solid #079097;
  background-image:linear-gradient(to bottom,transparent,var(--dark-color) 60%);
  -webkit-mask-image:linear-gradient(to top,transparent 30%,#079097 60%);
  mask-image:linear-gradient(to top,transparent 30%,#079097 60%);
}
.flower__g-right--1 { animation:flower-g-right-ans 2.5s linear infinite; }
.flower__g-right--2 { left:5vmin; transform:rotateY(-180deg); animation:flower-g-right-ans--2 3s linear infinite; }
.flower__g-right--2 .leaf { height:75vmin; filter:blur(.3vmin); opacity:.8; }

.flower__g-front {
  position:absolute; bottom:6vmin; left:2.5vmin; z-index:100;
  transform-origin:bottom center;
  transform:rotate(-28deg) rotateY(30deg) scale(1.04);
  animation:flower__g-front-ans 2s linear infinite;
}
.flower__g-front__line {
  width:.3vmin; height:20vmin; position:relative;
  background-image:linear-gradient(to top,transparent,#079097,transparent 100%);
}
.flower__g-front__leaf-wrapper {
  position:absolute; top:0; left:0; transform-origin:bottom left; transform:rotate(10deg);
}
.flower__g-front__leaf-wrapper:nth-child(even) { left:0; transform:rotateY(-180deg) rotate(5deg); animation:flower__g-front__leaf-left-ans 1s ease-in backwards; }
.flower__g-front__leaf-wrapper:nth-child(odd)  { animation:flower__g-front__leaf-ans 1s ease-in backwards; }
.flower__g-front__leaf-wrapper--1 { top:-8vmin; transform:scale(.7);                          animation:flower__g-front__leaf-ans       1s 5.5s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--2 { top:-8vmin; transform:rotateY(-180deg) scale(.7) !important; animation:flower__g-front__leaf-left-ans-2 1s 5.2s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--3 { top:-3vmin; animation-delay:4.9s !important; }
.flower__g-front__leaf-wrapper--4 { top:-3vmin; transform:rotateY(-180deg) scale(.9) !important; animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--5,.flower__g-front__leaf-wrapper--6 { top:2vmin; }
.flower__g-front__leaf-wrapper--7,.flower__g-front__leaf-wrapper--8 { top:6.5vmin; }
.flower__g-front__leaf-wrapper--5 { animation-delay:4.3s !important; }
.flower__g-front__leaf-wrapper--6 { animation-delay:4.1s !important; }
.flower__g-front__leaf-wrapper--7 { animation-delay:3.8s !important; }
.flower__g-front__leaf-wrapper--8 { animation-delay:3.5s !important; }
.flower__g-front__leaf {
  width:10vmin; height:10vmin;
  border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
  box-shadow:inset 0 2px 1vmin hsla(184deg,97%,58%,.2);
  background-image:
    linear-gradient(to bottom left,transparent,var(--dark-color)),
    linear-gradient(to bottom right,#159faa 50%,transparent 50%);
  -webkit-mask-image:linear-gradient(to bottom right,#159faa 50%,transparent 50%);
  mask-image:linear-gradient(to bottom right,#159faa 50%,transparent 50%);
}
.flower__g-fr {
  position:absolute; bottom:-4vmin; left:0; transform-origin:bottom left; z-index:10;
  animation:flower__g-fr-ans 2s linear infinite;
}
.flower__g-fr .leaf {
  width:30vmin; height:50vmin;
  border-top-left-radius:100%; border-left:2vmin solid #079097;
  -webkit-mask-image:linear-gradient(to top,transparent 25%,#079097 50%);
  mask-image:linear-gradient(to top,transparent 25%,#079097 50%);
  position:relative; z-index:1;
}
.flower__g-fr__leaf {
  position:absolute; top:0; left:0; width:10vmin; height:10vmin;
  border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
  box-shadow:inset 0 2px 1vmin hsla(184deg,97%,58%,.2);
  background-image:
    linear-gradient(to bottom left,transparent,var(--dark-color) 98%),
    linear-gradient(to bottom right,#23f0ff 45%,transparent 50%);
  -webkit-mask-image:linear-gradient(135deg,#159faa 40%,transparent 50%);
  mask-image:linear-gradient(135deg,#159faa 40%,transparent 50%);
}
.flower__g-fr__leaf--1 { left:20vmin; transform:rotate(45deg);  animation:flower__g-fr-leaft-ans-1 .5s 5.2s linear backwards; }
.flower__g-fr__leaf--2 { left:12vmin; top:-7vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 .5s 5.0s linear backwards; }
.flower__g-fr__leaf--3 { left:15vmin; top:6vmin;  transform:rotate(55deg);  animation:flower__g-fr-leaft-ans-5 .5s 4.8s linear backwards; }
.flower__g-fr__leaf--4 { left:6vmin;  top:-2vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 .5s 4.6s linear backwards; }
.flower__g-fr__leaf--5 { left:10vmin; top:14vmin; transform:rotate(55deg);  animation:flower__g-fr-leaft-ans-5 .5s 4.4s linear backwards; }
.flower__g-fr__leaf--6 { left:0;      top:6vmin;  transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 .5s 4.2s linear backwards; }
.flower__g-fr__leaf--7 { left:5vmin;  top:22vmin; transform:rotate(45deg);  animation:flower__g-fr-leaft-ans-7 .5s 4.0s linear backwards; }
.flower__g-fr__leaf--8 { left:-4vmin; top:15vmin; transform:rotate(15deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-8 .5s 3.8s linear backwards; }

/* LONG-G */
.long-g { position:absolute; bottom:25vmin; left:-42vmin; transform-origin:bottom left; }
.long-g--1 { bottom:0; transform:scale(.8) rotate(-5deg); }
.long-g--1 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 40%,#079097 80%) !important; mask-image:linear-gradient(to top,transparent 40%,#079097 80%) !important; }
.long-g--1 .leaf--1 { --w:5vmin; --h:60vmin; left:-2vmin; transform:rotate(3deg) rotateY(-180deg); }
.long-g--2,.long-g--3 { bottom:-3vmin; left:-35vmin; transform-origin:center; transform:scale(.6) rotateX(60deg); }
.long-g--2 .leaf,.long-g--3 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 50%,#079097 80%) !important; mask-image:linear-gradient(to top,transparent 50%,#079097 80%) !important; }
.long-g--2 .leaf--1,.long-g--3 .leaf--1 { left:-1vmin; transform:rotateY(-180deg); }
.long-g--3 { left:-17vmin; bottom:0; }
.long-g--3 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 40%,#079097 80%) !important; mask-image:linear-gradient(to top,transparent 40%,#079097 80%) !important; }
.long-g--4 { left:25vmin; bottom:-3vmin; transform-origin:center; transform:scale(.6) rotateX(60deg); }
.long-g--4 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 50%,#079097 80%) !important; mask-image:linear-gradient(to top,transparent 50%,#079097 80%) !important; }
.long-g--5 { left:42vmin; bottom:0; transform:scale(.8) rotate(2deg); }
.long-g--6 { left:0; bottom:-20vmin; z-index:100; filter:blur(.3vmin); transform:scale(.8) rotate(2deg); }
.long-g--7 { left:35vmin; bottom:20vmin; z-index:-1; filter:blur(.3vmin); transform:scale(.6) rotate(2deg); opacity:.7; }
.long-g .leaf {
  --w:15vmin; --h:40vmin; --c:#1aaa15;
  position:absolute; bottom:0; width:var(--w); height:var(--h);
  border-top-left-radius:100%; border-left:2vmin solid var(--c);
  -webkit-mask-image:linear-gradient(to top,transparent 20%,var(--dark-color));
  mask-image:linear-gradient(to top,transparent 20%,var(--dark-color));
  transform-origin:bottom center;
}
.long-g .leaf--0 { left:2vmin; animation:leaf-ans-1 4s linear infinite; }
.long-g .leaf--1 { --w:5vmin; --h:60vmin; animation:leaf-ans-1 4s linear infinite; }
.long-g .leaf--2 { --w:10vmin; --h:40vmin; left:-.5vmin; bottom:5vmin; transform-origin:bottom left; transform:rotateY(-180deg); animation:leaf-ans-2 3s linear infinite; }
.long-g .leaf--3 { --w:5vmin; --h:30vmin; left:-1vmin; bottom:3.2vmin; transform-origin:bottom left; transform:rotate(-10deg) rotateY(-180deg); animation:leaf-ans-3 3s linear infinite; }

/* GROW-ANS wrapper */
.grow-ans { animation:grow-ans 2s var(--d) backwards; }

/* ═══════════════════════════════════════════════
   FLOWER KEYFRAMES
═══════════════════════════════════════════════ */
@keyframes grow-ans         { 0%{transform:scale(0);opacity:0} }
@keyframes grow-flower-tree { 0%{height:0;border-radius:1vmin} }
@keyframes blooming-flower  { 0%{transform:scale(0)} }
@keyframes blooming-leaf-right {
  0%{transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(0)}
}
@keyframes blooming-leaf-left {
  0%{transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(0)}
}
@keyframes light-ans {
  0%  {opacity:0;transform:translateY(0)}
  25% {opacity:1;transform:translateY(-5vmin) translateX(-2vmin)}
  50% {opacity:1;transform:translateY(-15vmin) translateX(2vmin);filter:blur(.2vmin)}
  75% {transform:translateY(-20vmin) translateX(-2vmin);filter:blur(.2vmin)}
  100%{transform:translateY(-30vmin);opacity:0;filter:blur(1vmin)}
}
@keyframes moving-flower-1  { 0%,100%{transform:rotate(2deg)}   50%{transform:rotate(-2deg)} }
@keyframes moving-flower-2  { 0%,100%{transform:rotate(18deg)}  50%{transform:rotate(14deg)} }
@keyframes moving-flower-3  { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(-20deg) rotateY(-10deg)} }
@keyframes moving-grass     { 0%,100%{transform:rotate(-48deg) rotateY(40deg)} 50%{transform:rotate(-50deg) rotateY(40deg)} }
@keyframes moving-grass--2  { 0%,100%{transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg)} 50%{transform:scale(.5) rotate(79deg) rotateX(10deg) rotateY(-200deg)} }
@keyframes flower-g-long-ans{ 0%,100%{transform:rotate(-30deg) rotateY(-20deg)} 50%{transform:rotate(-32deg) rotateY(-20deg)} }
@keyframes flower-g-right-ans     { 0%,100%{transform:rotate(20deg)} 50%{transform:rotate(24deg) rotateX(-20deg)} }
@keyframes flower-g-right-ans--2  { 0%,100%{transform:rotateY(-180deg) rotate(0deg) rotateX(-20deg)} 50%{transform:rotateY(-180deg) rotate(6deg) rotateX(-20deg)} }
@keyframes flower__g-front-ans    { 0%,100%{transform:rotate(-28deg) rotateY(30deg) scale(1.04)} 50%{transform:rotate(-35deg) rotateY(40deg) scale(1.04)} }
@keyframes flower__g-fr-ans       { 0%,100%{transform:rotate(2deg)} 50%{transform:rotate(4deg)} }
@keyframes flower__g-front__leaf-ans       { 0%{transform:rotate(10deg) scale(0)} }
@keyframes flower__g-front__leaf-left-ans  { 0%{transform:rotateY(-180deg) rotate(5deg) scale(0)} }
@keyframes flower__g-front__leaf-left-ans-2{ 0%{transform:rotateY(-180deg) scale(0)} }
@keyframes flower__g-fr-leaft-ans-1{ 0%{transform-origin:left;  transform:rotate(45deg) scale(0)} }
@keyframes flower__g-fr-leaft-ans-5{ 0%{transform-origin:left;  transform:rotate(55deg) scale(0)} }
@keyframes flower__g-fr-leaft-ans-6{ 0%{transform-origin:right; transform:rotate(25deg) rotateY(-180deg) scale(0)} }
@keyframes flower__g-fr-leaft-ans-7{ 0%{transform-origin:left;  transform:rotate(45deg) scale(0)} }
@keyframes flower__g-fr-leaft-ans-8{ 0%{transform-origin:right; transform:rotate(15deg) rotateY(-180deg) scale(0)} }
@keyframes growing-grass-ans       { 0%{transform:scale(0)} }
@keyframes leaf-ans-1 { 0%,100%{transform:rotate(-5deg) scale(1)} 50%{transform:rotate(5deg) scale(1.1)} }
@keyframes leaf-ans-2 { 0%,100%{transform:rotateY(-180deg) rotate(5deg)} 50%{transform:rotateY(-180deg) rotate(0deg) scale(1.1)} }
@keyframes leaf-ans-3 { 0%,100%{transform:rotate(-10deg) rotateY(-180deg)} 50%{transform:rotate(-20deg) rotateY(-180deg)} }

/* ═══════════════════════════════════════════════
   AUDIO PLAYER
═══════════════════════════════════════════════ */
#player {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:100;

.pbtn {

}

.play-btn {

.track-info { flex:1; min-width:0 }

.prog-bar  { height:3px; background:rgba(255,215,0,.14); border-radius:3px; cursor:pointer; pointer-events:all; }
.prog-fill { height:100%; background:#FFD700; border-radius:3px; width:0%; transition:width .6s linear; }
